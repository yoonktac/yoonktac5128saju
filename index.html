<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>운명</title>
  <meta name="apple-mobile-web-app-title" content="운명">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="application-name" content="운명">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:#f4f6fb;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
#app{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.tab-content{flex:1;display:none;flex-direction:column;overflow:hidden;}
.tab-content.active{display:flex;}
#bottom-nav{background:#fff;border-top:1px solid #f0f0f0;display:flex;padding-bottom:max(env(safe-area-inset-bottom,0px),20px);flex-shrink:0;}
.nav-btn{flex:1;padding:10px 0 4px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:#c8cdd8;font-family:inherit;-webkit-tap-highlight-color:transparent;}
.nav-btn.active{color:#2563eb;}
.nav-btn .ic{font-size:19px;line-height:1;}
.nav-btn .lb{font-size:9px;font-weight:700;}

/* ── 입력 ── */
#tab-input{overflow-y:hidden;background:linear-gradient(155deg,#0c1220 0%,#1a2540 55%,#0f1c30 100%);color:#fff;}
.inp-wrap{padding:32px 24px calc(40px + env(safe-area-inset-bottom, 0px));}
.inp-title{text-align:center;margin-bottom:24px;}
.inp-title .sub{font-size:11px;letter-spacing:6px;color:#475569;margin-bottom:8px;font-weight:600;}
.inp-title h1{font-size:28px;font-weight:900;letter-spacing:-1.5px;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.inp-group{margin-bottom:16px;}
.inp-group label{font-size:11px;color:#64748b;display:block;margin-bottom:6px;}
.inp-field::placeholder{color:rgba(241,245,249,.4);}
.inp-field::-webkit-input-placeholder{color:rgba(241,245,249,.4);}
.inp-field{width:100%;padding:13px 14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:12px;color:#f1f5f9;font-size:16px;outline:none;font-family:inherit;-webkit-appearance:none;}
.seg{display:flex;background:rgba(255,255,255,.06);border-radius:10px;padding:3px;border:1px solid rgba(255,255,255,.1);}
.seg-btn{flex:1;padding:10px 0;border:none;border-radius:8px;cursor:pointer;background:transparent;color:#475569;font-size:13px;font-weight:700;font-family:inherit;transition:all .1s;}
.seg-btn.active{background:rgba(255,255,255,.16);color:#f1f5f9;}
.num-row{display:flex;gap:6px;}
.num-box{display:flex;align-items:center;background:rgba(255,255,255,.07);border-radius:10px;border:1px solid rgba(255,255,255,.12);overflow:hidden;height:40px;}
.num-box.y2{flex:2;}
.num-box.x1{flex:1;}
.nb-btn{background:none;border:none;color:#94a3b8;font-size:18px;cursor:pointer;padding:0 10px;line-height:40px;font-family:inherit;}
.nb-val{flex:1;text-align:center;font-size:12px;color:#f1f5f9;font-weight:700;}
.shi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:6px;}
.shi-btn{padding:6px 2px;border-radius:9px;border:none;cursor:pointer;font-family:inherit;font-size:10px;font-weight:500;background:rgba(255,255,255,.07);color:#64748b;transition:all .1s;text-align:center;line-height:1.4;}
.shi-btn.active{font-weight:800;}
.hour-clear{padding:5px 12px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:10px;font-weight:700;background:rgba(255,255,255,.1);color:#64748b;}

function jdn(y,m,d){
  var a=Math.floor((14-m)/12),yy=y+4800-a,mm=m+12*a-3;
  return d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;
}

function calcNewMoonKST(k){
  var T=k/1236.85,T2=T*T;
  var jde=2451550.09766+29.530588861*k+0.00015437*T2;
  var M=((2.5534+29.10535670*k)%360)*Math.PI/180;
  var Mp=((201.5643+385.81693528*k)%360)*Math.PI/180;
  var F=((160.7108+390.67050284*k)%360)*Math.PI/180;
  jde+=-0.40720*Math.sin(Mp)+0.17241*Math.sin(M)+0.01608*Math.sin(2*Mp)
    +0.01039*Math.sin(2*F)+0.00739*Math.sin(Mp-M)-0.00514*Math.sin(Mp+M)
    +0.00208*Math.sin(2*M)-0.00111*Math.sin(Mp-2*F)-0.00057*Math.sin(Mp+2*F)
    +0.00056*Math.sin(2*Mp+M)-0.00042*Math.sin(3*Mp)+0.00042*Math.sin(M+2*F)
    +0.00038*Math.sin(M-2*F)-0.00024*Math.sin(2*Mp-M);
  return Math.floor(jde+0.5+9/24); // KST +9h 기준 정수 JDN
}
function jdnToDate(n){
  var l=n+68569,q=Math.floor(4*l/146097);
  var l2=l-Math.floor((146097*q+3)/4);
  var i=Math.floor(4000*(l2+1)/1461001),l3=l2-Math.floor(1461*i/4)+31;
  var j=Math.floor(80*l3/2447),d=l3-Math.floor(2447*j/80);
  var l4=Math.floor(j/11),m=j+2-12*l4,y=100*(q-49)+i+l4;
  return[y,m,d];
}

function findLunarNewYearJDN(ly){
  var s=jdn(ly,1,20),e=jdn(ly,2,22);
  var k0=Math.round((s-2451550.09766)/29.530588861);
  for(var dk=-2;dk<=3;dk++){var nm=calcNewMoonKST(k0+dk);if(nm>=s&&nm<=e)return nm;}
  return calcNewMoonKST(k0);
}

function lunarToSolar(ly,lm,ld,isLeap){
  if(isLeap===undefined)isLeap=false;

function jDateTotalMin(yr,idx){
  var hm=JEOLGI_HM[yr];
  var h=hm?hm[idx][0]:0,m=hm?hm[idx][1]:0;
  return jDateJDN(yr,idx)*1440+h*60+m;
}

// 연주+월주 통합 계산 (입춘 기준 연주 + 절기 기준 월주)
// 검증: 플러스만세력 2026년 4월 전체, 입춘 경계(2026-02-03/04) 완벽 일치
function calcYM(y,m,d){
  var jd=jDateJDN(y,m-1), bd=jdn(y,m,d);
  var eM=m,eY=y,jeolgiJDN=jd;
  if(bd<jd){
    eM=m-1;if(eM===0){eM=12;eY=y-1;}
    jeolgiJDN=jDateJDN(eY,eM-1);
  }
  // \u4e11\u6708(eM=1) = 아직 입춘 전 \u2192 연주는 전년도
  var yf=(eM===1)?eY-1:eY;
  var ysi=((yf-4)%10+10)%10;
  var ybi=((yf-4)%12+12)%12;
  // 월주 천간: \u5bc5\u6708(eM=2) 기준 오호둔(\u4e94\u864e\u9041)
  var off=((eM-2)%12+12)%12;
  var msi=(MTH_BASE[ysi%5]+off)%10;
  var mbi=MONTH_BI[eM-1];
  var daysSinceJeolgi=bd-jeolgiJDN; // 입절기 이후 며칠
  return{yP:{si:ysi,bi:ybi},mP:{si:msi,bi:mbi},daysSinceJeolgi:daysSinceJeolgi};
}

function findSaryeong(mBi,days){
  var tbl=SARYEONG_TABLE[mBi];
  var acc=0;
  for(var _foi53=0;_foi53<tbl.length;_foi53++){var si=tbl[_foi53][0],d=tbl[_foi53][1];
    acc+=d;
    if(days<acc)return{si:si,phase:tbl.findIndex(function(x){return x[0]===si;})===0?'초기':tbl.findIndex(function(x){return x[0]===si;})===tbl.length-1?'본기':'중기'};
  }
  return{si:tbl[tbl.length-1][0],phase:'본기'};
}

}

// 시주: 오자둔(\u4e94\u5b50\u9041) - 일간 기준
// 시주 계산 - 30분 경계: 23:30부터 자시 시작
function hourP(h,m,dsi){
  // 총 분 \u2192 23:30 기준으로 이동 \u2192 120분(2시간)씩 끊기
  var totalM=h*60+(m||0);
  var adjM=(totalM-23*60-30+24*60)%(24*60);
  var bi=Math.floor(adjM/120)%12;
  return{si:([0,2,4,6,8][dsi%5]+bi)%10,bi:bi};
}

// 대운 계산
function calcDW(mP,fwd,bY,bM,bD,bH,bMin){
  var idx=BI_JG[mP.bi];var yr=bY;
  if(idx===11&&bM<=1)yr=bY-1;
  var ni=(idx+1)%12,ny=ni===0?yr+1:yr;
  var bd=jdn(bY,bM,bD);
  // ── 정밀계산: 출생 시각 + 절기 입기 시각 포함, 분 단위
  var birthTotalMin=bd*1440+(bH||0)*60+(bMin||0);
  var jeolgiTotalMin=fwd?jDateTotalMin(ny,ni):jDateTotalMin(yr,idx);
  var totalMin=Math.max(0,fwd?jeolgiTotalMin-birthTotalMin:birthTotalMin-jeolgiTotalMin);
  // 3일(4320분)=1년, 360분=1개월, 12분=1일
  var sAge=Math.floor(totalMin/4320);
  var remMin=totalMin%4320;
  var sMo=Math.floor(remMin/360);
  var sDay=Math.floor((remMin%360)/12);
  // ── 약식계산: 날짜 차이만, 3으로 나눔 → 년 단위
  var jeolgiDays=fwd?jDateJDN(ny,ni):jDateJDN(yr,idx);
  var rawDays=Math.max(0,fwd?jeolgiDays-bd:bd-jeolgiDays);
  var sAgeSimple=Math.floor(rawDays/3);
  var b=0;for(var i=0;i<60;i++)if(i%10===mP.si&&i%12===mP.bi){b=i;break;}
  // 정밀: year = 출생년 + 경과년수 (실제 교운일 기준)
  var makeDW=function(age){
    return Array.from({length:10},function(_,i){
      var n=fwd?(b+i+1)%60:((b-i-1)%60+60)%60;
      return{si:n%10,bi:n%12,age:age+i*10,year:bY+age+i*10};
    });
  };
  // 약식: year = 출생년 + (한국나이 - 1) → bY + age - 1 + i*10
  var makeDWSimple=function(age){
    return Array.from({length:10},function(_,i){
      var n=fwd?(b+i+1)%60:((b-i-1)%60+60)%60;
      return{si:n%10,bi:n%12,age:age+i*10,year:bY+(age-1)+i*10};
    });
  };
  return{
    startAge:sAge,startMonths:sMo,startDays:sDay,
    startAgeSimple:sAgeSimple,
    daeW:makeDW(sAge),
    daeWSimple:makeDWSimple(sAgeSimple)
  };
}

// 십신
function sipsin(dm,ti){
  if(dm===ti)return'비견';
  var dE=SEL[dm],tE=SEL[ti],sy=SYN[dm]===SYN[ti];
  if(dE===tE)return sy?'비견':'겁재';
  if(GEN[dE]===tE)return sy?'식신':'상관';
  if(CON[dE]===tE)return sy?'편재':'정재';
  if(GEN[tE]===dE)return sy?'편인':'정인';
  if(CON[tE]===dE)return sy?'편관':'정관';
  return'-';
}

  // \u2500\u2500 천간합 처리 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  // \u7532\u5df1토, \u4e59\u5e9a금, \u4e19\u8f9b수, \u4e01\u58ec목, \u620a\u7678화

  // 충이 있으면 해당 지지의 힘 절반으로

  // 신강약 점수제 (정통 명리 — 지장간·자리가중·십성차등)

  // 일간합 약화

  var dJ=_dJhas||((OS_STR[oonsung(dm,dP.bi)]||0)>=6);
  var hc=1;

  // \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501 \u2461 격국 \u2014 투간 우선 + 혼잡 판별 \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
  var YANGIN={0:3,2:6,4:6,6:9,8:0};

  } else {

  // 판정 최종 확정 (격국 가산 score 반영)

  sgGrade=score>=25?'신강':score>=5?'중강':score>=-5?'중화':score>=-25?'중약':'신약';

  // \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501 \u2462 사령 (입절 일수 기반) \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501

    ys=sg==='신강'

    ys=sg==='신강'
      ?{yong:wealth,hee:kill,gi:off2,gu:dmE,han:food}
      :{yong:off2,hee:dmE,gi:wealth,gu:kill,han:food};

  } else {
    ys=sg==='신강'
      ?{yong:food,hee:wealth,gi:off2,gu:dmE,han:kill}
      :{yong:off2,hee:dmE,gi:wealth,gu:kill,han:food};
  }

  // \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501 \u2464 조후 우선 적용 \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
  var HANAN={'목':0.5,'화':2,'토':1,'금':-1,'수':-2};
  var JOHAT={'목':-0.5,'화':2,'토':1,'금':-0.5,'수':-2};
  var hnScore=0,jhScore=0;
  var _johooArr=noHour?[yP,mP,dP]:[yP,mP,dP,hP];
  var _johooMax=noHour?16:20;
  _johooArr.forEach(function(p,idx){var wt=idx===1?2:1;hnScore+=(HANAN[SEL[p.si]]||0)*wt+(HANAN[BEL[p.bi]]||0)*wt;jhScore+=(JOHAT[SEL[p.si]]||0)*wt+(JOHAT[BEL[p.bi]]||0)*wt;});
  var hnVal=Math.max(-1,Math.min(1,hnScore/_johooMax));
  var jhVal=Math.max(-1,Math.min(1,jhScore/_johooMax));
  var isExtremeHot=hnVal>0.5||jhVal<-0.5;
  var isExtremeCold=hnVal<-0.5||jhVal>0.5;
  // 조후용신 테이블: 일간(dm) × 월지(mP.bi) 조합 (궁통보감 기준)
  // key: 'dm-bi', value: 필요 오행
  var JOHOO_TABLE={

    // 未月(bi=7) — 늦여름
    '0-7':'수','1-7':'수','2-7':'수','3-7':'수','4-7':'수',
    '5-7':'수','6-7':'수','7-7':'수','8-7':'수','9-7':'금',
  };
  var JOHOO_BI_NM={0:'亥月 초겨울',11:'子月 한겨울',1:'丑月 늦겨울',2:'寅月 초봄',5:'巳月 초여름',6:'午月 한여름',7:'未月 늦여름'};
  var johooApplied=null;
  var _jKey=dm+'-'+mP.bi;
  var _jNeed=JOHOO_TABLE[_jKey];
  if(_jNeed!==undefined){

    if(ys.yong===need){

function makeStep(field,min,max){
  return {
    dec: function(){
      if(field==='hour'){
        f.hour = f.hour===null ? 23 : Math.max(min, f.hour-1);
      } else {
        f[field] = Math.max(min, (f[field]||min)-1);
      }
      updateInputUI();
    },
    inc: function(){
      if(field==='hour'){
        f.hour = f.hour===null ? 0 : Math.min(max, f.hour+1);
      } else {
        f[field] = Math.min(max, (f[field]||min)+1);
      }
      updateInputUI();
    }
  };
}

    if(da>_maxDay[mo])da=_maxDay[mo];

  var yr2=yr,mo2=mo,da2=da;
  if(f.cal==='음력'){

var _ST_ALL=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];

// 양간(0,2,4,6,8)=950 / 음간(1,3,5,7,9)=300 / 지지 BYN[]=0양1음
function colorHanja(txt){
  // 천간
  for(var _i=0;_i<_ST_ALL.length;_i++){
    var _ch=_ST_ALL[_i];
    var _col=_HC[SEL[_i]];
    var _fw=SYN[_i]===0?950:300;
    txt=txt.split(_ch).join('<span style="color:'+_col+';font-weight:'+_fw+';font-size:1.15em;font-family:serif;">'+_ch+'</span>');
  }
  // 지지
  for(var _j=0;_j<_BR_ALL.length;_j++){
    var _bch=_BR_ALL[_j];
    var _col2=_HC[BEL[_j]];
    var _fw2=BYN[_j]===0?950:300;
    txt=txt.split(_bch).join('<span style="color:'+_col2+';font-weight:'+_fw2+';font-size:1.15em;font-family:serif;">'+_bch+'</span>');
  }
  return txt;
}

  var timeStr=noHour?'시간모름':('0'+form.hour).slice(-2)+':'+('0'+(form.minute||0)).slice(-2);

  // 미니 기둥 (연/월/일/시 순서, 시간없으면 3개)
  var pillars=noHour?[dP,mP,yP]:[hP,dP,mP,yP];
  var miniStem='',miniBranch='';

    var sel=SEL[p.si],bel=BEL[p.bi];

    miniStem+='<span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:5px;background:'+sc.bg+';color:'+sc.tx+';font-size:10px;font-weight:800;font-family:serif;">'+ST[p.si]+'</span>';

  ):'';
  var starBtn='<button class="star-btn'+(starred?' starred':'')+'" onclick="toggleFav('+id+',true);event.stopPropagation();" style="background:none;border:none;font-size:24px;line-height:1;padding:0 6px 0 0;cursor:pointer;color:'+(starred?'#f59e0b':'#cbd5e1')+';flex-shrink:0;">'+(starred?'★':'☆')+'</button>';
  var _delFn=isSave?'deleteSavedOne':'deleteOne';
  var delOneBtn='<button style="background:none;border:none;padding:4px 2px;font-size:16px;color:#94a3b8;cursor:pointer;" onclick="'+_delFn+'('+id+');event.stopPropagation();">🗑</button>';

    // 별표 (왼쪽)

    +'</div>'

function renderRecent(){
  var list=state.recent.slice();
  if(state.recentSort==='이름'){list.sort(function(a,b){return (a.form.name||'').localeCompare(b.form.name||'');});if(state.nameDir==='desc')list.reverse();}
  else if(state.recentDir==='asc')list.reverse();
  var el=document.getElementById('recent-list');
  if(!list.length){el.innerHTML='<div class="empty-state"><div class="empty-inner"><div class="empty-ic">🕐</div><div class="empty-title">최근 기록 없음</div><div class="empty-sub">사주를 입력하면 자동으로 쌓입니다</div></div></div>';return;}
  el.innerHTML=list.map(function(entry){
    var starred=state.favIds.has(entry.id);
    return makeEntryCardHTML(entry,true,starred,false,false);
  }).join('');
  attachSwipe(el);
  attachDrag(el);
}
function renderSave(){
  var q=state.saveQ.toLowerCase();
  var list=state.saved.filter(function(e){return state.favIds.has(e.id);});
  if(q){list=list.filter(function(e){var nm=(e.form.name||'').toLowerCase();var p8=p8str(e.saju);return nm.includes(q)||p8.includes(q);});}
  var pinned=list.filter(function(e){return state.pinnedIds.has(e.id);});
  var rest=list.filter(function(e){return !state.pinnedIds.has(e.id);});
  if(state.saveSort==='이름'){rest.sort(function(a,b){return (a.form.name||'').localeCompare(b.form.name||'');});if(state.saveNameDir==='desc')rest.reverse();}
  else if(state.saveDir==='asc')rest.reverse();
  var el=document.getElementById('save-list');
  var allStarred=state.saved.filter(function(e){return state.favIds.has(e.id);});
  if(!allStarred.length){el.innerHTML='<div class="empty-state"><div class="empty-inner"><div class="empty-ic">💾</div><div class="empty-title">저장된 항목 없음</div><div class="empty-sub">최근 탭에서 ☆를 눌러 저장하세요</div></div></div>';return;}
  if(!list.length&&allStarred.length){el.innerHTML='<div style="text-align:center;padding-top:40px;color:#94a3b8;">검색 결과 없음</div>';return;}
  var html='';
  // 고정 섹션
  if(pinned.length){
    html+='<div style="font-size:10px;color:#ef4444;font-weight:800;margin-bottom:6px;padding-left:2px;letter-spacing:.5px;">📌 고정</div>';
    pinned.forEach(function(e){
      html+=makeEntryCardHTML(e,true,state.favIds.has(e.id),true,true,true);
    });
  }
  // 비고정 섹션
  if(rest.length){
    if(pinned.length) html+='<div style="font-size:10px;color:#94a3b8;font-weight:700;margin:12px 0 6px;padding-left:2px;border-top:1px solid #f0f2f7;padding-top:10px;">목록</div>';
    rest.forEach(function(e){
      html+=makeEntryCardHTML(e,true,state.favIds.has(e.id),true,false,true);
    });
  }
  el.innerHTML=html;
  attachSwipe(el);
  attachDrag(el);
}

// ── 스와이프 삭제 ──────────────────────────────────────────────────────────────
function attachSwipe(listEl) {
  if(!listEl) return;
  var THRESHOLD=80;
  listEl.querySelectorAll('.entry-card-wrap').forEach(function(wrap) {
    var card=wrap.querySelector('.entry-card');
    if(!card) return;
    var startX=0, dx=0, swiping=false;
    card.addEventListener('touchstart', function(e) {
      startX=e.touches[0].clientX; dx=0; swiping=false;
    },{passive:true});
    card.addEventListener('touchmove', function(e) {
      var d=startX-e.touches[0].clientX;
      if(d>8){ swiping=true; dx=Math.min(d,THRESHOLD+20); card.style.transform='translateX(-'+dx+'px)'; card.style.transition='none'; }
      else if(d<-4){ dx=0; card.style.transform='translateX(0)'; }
    },{passive:true});
    card.addEventListener('touchend', function() {
      if(dx>=THRESHOLD){
        card.style.transform='translateX(-'+THRESHOLD+'px)';
        card.style.transition='transform .2s ease';
        // 삭제 확인
        var eid=parseInt(wrap.dataset.id)||0;
        if(eid) setTimeout(function(){ askDelete(eid); card.style.transform='translateX(0)'; card.style.transition='transform .2s ease'; },200);
      } else {
        dx=0; card.style.transform='translateX(0)'; card.style.transition='transform .2s ease';
      }
      swiping=false;
    });
  });
}


// ── 드래그 순서변경 ──────────────────────────────────────────────────────────
function attachDrag(listEl){
  if(!listEl)return;
  var dragging=null,clone=null,startY=0,scrollTop=0,holdTimer=null,isHolding=false;

  listEl.querySelectorAll('.entry-card-wrap').forEach(function(wrap){
    var card=wrap.querySelector('.entry-card');
    if(!card)return;

    card.addEventListener('touchstart',function(e){
      if(wrap.dataset.pinned==='1')return; // 고정 섹션 드래그 금지
      holdTimer=setTimeout(function(){
        isHolding=true;
        dragging=wrap;
        var rect=wrap.getBoundingClientRect();
        scrollTop=listEl.scrollTop;
        startY=e.touches[0].clientY;
        // 클론 생성 (fixed 위치로 띄우기)
        clone=wrap.cloneNode(true);
        clone.style.cssText='position:fixed;left:'+rect.left+'px;top:'+rect.top+'px;width:'+rect.width+'px;opacity:.85;z-index:9999;pointer-events:none;box-shadow:0 12px 32px rgba(0,0,0,.25);border-radius:14px;transition:none;';
        document.body.appendChild(clone);
        // 원본 카드 반투명
        wrap.style.opacity='0.3';
        listEl.style.overflow='hidden';
        listEl.style.touchAction='none';
      },400);
    },{passive:true});

    card.addEventListener('touchmove',function(e){
      clearTimeout(holdTimer);
      if(!isHolding||!clone)return;
      e.preventDefault();
      var dy=e.touches[0].clientY-startY;
      var rect=wrap.getBoundingClientRect();
      clone.style.top=(rect.top+dy)+'px';
      var cy=e.touches[0].clientY;
      var allWraps=Array.from(listEl.querySelectorAll('.entry-card-wrap'));
      // 같은 섹션(고정/비고정)의 카드만 대상
      var myPinned=dragging.dataset.pinned;
      var wraps=allWraps.filter(function(w){return w.dataset.pinned===myPinned;});
      var dragIdx=wraps.indexOf(dragging);
      var dragH=dragging.offsetHeight+8;
      // 삽입 위치 계산 (같은 섹션 내에서만)
      var insertIdx=wraps.length;
      for(var i=0;i<wraps.length;i++){
        if(wraps[i]===dragging)continue;
        var wr=wraps[i].getBoundingClientRect();
        if(cy<wr.top+wr.height/2){insertIdx=i;break;}
      }
      // 같은 섹션 카드들만 밀어주기 애니메이션
      wraps.forEach(function(w,i){
        if(w===dragging)return;
        w.style.transition='transform .15s ease';
        var shift=0;
        if(dragIdx<insertIdx){if(i>dragIdx&&i<insertIdx)shift=-dragH;}
        else{if(i>=insertIdx&&i<dragIdx)shift=dragH;}
        w.style.transform=shift?'translateY('+shift+'px)':'';
      });
    },{passive:false});

    var endFn=function(e){
      clearTimeout(holdTimer);
      if(!isHolding){isHolding=false;return;}
      isHolding=false;
      if(clone){clone.remove();clone=null;}
      if(dragging)dragging.style.opacity='';
      listEl.style.overflow='';
      listEl.style.touchAction='';
      // 모든 카드 transform/transition 초기화
      listEl.querySelectorAll('.entry-card-wrap').forEach(function(w){
        w.style.transform='';
        w.style.transition='';
        w.querySelector('.entry-card').style.borderTop='';
      });
      // 드롭 위치 찾기
      if(e&&e.changedTouches){
        var ey=e.changedTouches[0].clientY;
        var myPin=dragging.dataset.pinned;
        var wraps=Array.from(listEl.querySelectorAll('.entry-card-wrap')).filter(function(w){return w.dataset.pinned===myPin;});
        var targetWrap=null;
        for(var i=0;i<wraps.length;i++){
          if(wraps[i]===dragging)continue;
          var wr=wraps[i].getBoundingClientRect();
          if(ey<wr.top+wr.height/2){targetWrap=wraps[i];break;}
        }
        var fromId=parseInt(dragging.dataset.id)||0;
        var toId=targetWrap?parseInt(targetWrap.dataset.id)||0:0;
        if(fromId&&fromId!==toId){
          var isRecent=listEl.id==='recent-list';
          var arr=isRecent?state.recent:state.saved;
          var item=arr.find(function(e){return e.id===fromId;});
          if(item){
            if(isRecent)state.recent=arr.filter(function(e){return e.id!==fromId;});
            else state.saved=arr.filter(function(e){return e.id!==fromId;});
            var arr2=isRecent?state.recent:state.saved;
            if(toId){
              var ni=arr2.findIndex(function(e){return e.id===toId;});
              if(ni>=0)arr2.splice(ni,0,item);
              else arr2.push(item);
            } else {
              arr2.push(item);
            }
            saveStorage();
            if(isRecent)renderRecent();else renderSave();
          }
        }
      }
      dragging=null;
    };
    card.addEventListener('touchend',endFn);
    card.addEventListener('touchcancel',endFn,{passive:true});
  });
}
